[window]
opacity = 0.95
padding = { x = 10, y = 10 }
startup_mode = "Fullscreen"
decorations = "None"

[font]
size = 13

[font.normal]
family = "JetBrainsMono Nerd Font"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#ebdbb2"

[colors.selection]
text = "CellForeground"
background = "#504945"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"

[selection]
save_to_clipboard = true
